<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADJUTANT CORE — Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="scanline-overlay"></div>

    <div class="command-center">
        <!-- ═══ TOP BAR ═══ -->
        <header class="top-bar">
            <div class="top-bar-left">
                <div class="ai-avatar" id="adjutant-portrait">
                    <div class="avatar-ring"></div>
                    <img src="/static/portrait-adjutant.png" alt="ADJUTANT" class="avatar-img">
                    <div class="avatar-pulse"></div>
                </div>
                <div class="system-id">
                    <div class="system-name">ADJUTANT <span class="core-label">CORE</span></div>
                    <div class="system-sub">TACTICAL KNOWLEDGE MANAGEMENT SYSTEM</div>
                </div>
            </div>
            <div class="top-bar-right">
                <div class="status-block">
                    <span class="status-label">SYS</span>
                    <span class="status-value" id="status-text">INITIALIZING</span>
                    <span class="status-dot" id="status-dot"></span>
                </div>
                <div class="status-block">
                    <span class="status-label">UPLINK</span>
                    <span class="status-value uplink" id="uplink-status">—</span>
                </div>
                <div class="clock-block">
                    <span class="clock" id="clock">00:00:00</span>
                </div>
            </div>
        </header>

        <!-- ═══ MAIN AREA ═══ -->
        <div class="main-area">
            <!-- ═══ LEFT PANEL ═══ -->
            <aside class="left-panel">
                <div class="panel-header">OPERATIONS</div>
                <nav class="module-list" id="mode-bar">
                    <!-- Populated by JS -->
                </nav>
                <div class="panel-divider"></div>
                <nav class="module-list module-list-util">
                    <button class="module-btn" id="btn-sessions" type="button">
                        <span class="module-icon">📂</span>
                        <span class="module-label">History</span>
                    </button>
                </nav>
            </aside>

            <!-- ═══ MAIN TERMINAL ═══ -->
            <main class="terminal-panel">
                <div class="terminal-header">
                    <span class="terminal-title">COMMAND FEED</span>
                    <span class="terminal-indicator" id="terminal-indicator"></span>
                </div>
                <div class="terminal-feed" id="briefing-text">
                    <div class="welcome-screen">
                        <div class="welcome-logo">ADJUTANT</div>
                        <div class="welcome-tagline">TACTICAL KNOWLEDGE MANAGEMENT</div>
                        <div class="welcome-version">v0.1.0 — SYSTEM READY</div>
                        <div class="welcome-hint">Issue a command or select an operation module</div>
                    </div>
                </div>
            </main>
        </div>

        <!-- ═══ BOTTOM INPUT ═══ -->
        <footer class="bottom-bar">
            <div id="image-bar" class="image-bar"></div>
            <form id="chat-form" class="command-line">
                <span class="prompt-symbol">&gt;</span>
                <span class="prompt-label">COMMAND INPUT:</span>
                <textarea id="chat-input" class="command-input"
                    placeholder="Enter directive..."
                    autocomplete="off" autofocus rows="1"></textarea>
                <div class="command-actions">
                    <button type="submit" class="action-btn execute" id="btn-send">EXECUTE</button>
                    <button type="button" class="action-btn abort" id="btn-cancel" style="display:none">ABORT</button>
                </div>
            </form>
        </footer>
    </div>

    <!-- ═══ SESSION HISTORY MODAL ═══ -->
    <div id="modal-sessions" class="modal-overlay" style="display:none">
        <div class="modal-panel">
            <div class="modal-header">
                <span class="modal-title">BRIEFING ARCHIVE</span>
                <button class="action-btn" id="modal-close-btn" data-modal="modal-sessions">CLOSE</button>
            </div>
            <div class="modal-body" id="sessions-list"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
